# ============================================================================
# ⚠️  STALE / ABANDONED — DO NOT RUN `xcodegen generate` AGAINST THIS FILE  ⚠️
# ----------------------------------------------------------------------------
# This XcodeGen spec is NO LONGER the source of truth for the Xcode project.
# The authoritative project definition is the hand-maintained
# `SeerrClient.xcodeproj/project.pbxproj`. This file has drifted badly and is
# kept only for historical reference. Regenerating from it WOULD BREAK the
# project. Do not trust or edit it as if it were live.
#
# Decision (2026-07-19, tech-architect, tvOS pre-work): XcodeGen is abandoned
# for this repo; continue editing `project.pbxproj` directly. Rationale:
#   1. REVERTS THE REBRAND — this spec still says `com.rodrigoindustries` and
#      `com.rodrigoindustries.SeerrClient`, but the merged reality is
#      `com.frostforgelabs.OctopusExplorer`. A regen would silently undo the
#      Octopus Explorer bundle-ID/rename that already shipped to `dev`.
#   2. MISSING A TARGET — the real project has `SeerrClientUITests`; this spec
#      does not, so a regen would delete the entire UI-test target.
#   3. DROPS HAND-TUNED SETTINGS — the .pbxproj carries DEVELOPMENT_TEAM,
#      CODE_SIGN_IDENTITY, all INFOPLIST_KEY_* (FaceID usage, LaunchScreen,
#      orientations, CFBundleDisplayName), LD_RUNPATH_SEARCH_PATHS, TEST_HOST /
#      BUNDLE_LOADER / TEST_TARGET_NAME wiring, and the full CLANG/GCC warning
#      block — none of which are encoded here. A regen replaces them with
#      XcodeGen defaults (this is the ~266-line unrelated churn seen before).
#   4. CLOBBERS THE SHARED SCHEME — the shared `SeerrClient.xcscheme` is not
#      declared here, so a regen deletes it.
# Reconciling this file well enough to round-trip cleanly is disproportionate
# to the goal (adding one tvOS target), and every future direct .pbxproj edit
# would re-introduce drift. The tvOS target will be added by direct .pbxproj
# edit, consistent with the repo's established convention.
# ============================================================================
name: SeerrClient
options:
  bundleIdPrefix: com.rodrigoindustries
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5"
    SWIFT_STRICT_CONCURRENCY: targeted
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: false
    INFOPLIST_FILE: SeerrClient/App/Info.plist

targets:
  SeerrClient:
    type: application
    platform: iOS
    sources:
      - path: SeerrClient
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rodrigoindustries.SeerrClient
        INFOPLIST_FILE: SeerrClient/App/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ENABLE_PREVIEWS: "YES"

  SeerrClientTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SeerrClientTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: SeerrClient
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rodrigoindustries.SeerrClientTests
        GENERATE_INFOPLIST_FILE: true
        SWIFT_STRICT_CONCURRENCY: targeted
