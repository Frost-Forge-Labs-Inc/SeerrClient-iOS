name: SeerrClient
options:
  bundleIdPrefix: com.rodrigoindustries
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5"
    SWIFT_STRICT_CONCURRENCY: targeted
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: false
    INFOPLIST_FILE: SeerrClient/App/Info.plist

targets:
  SeerrClient:
    type: application
    platform: iOS
    sources:
      - path: SeerrClient
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rodrigoindustries.SeerrClient
        INFOPLIST_FILE: SeerrClient/App/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ENABLE_PREVIEWS: "YES"

  SeerrClientTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SeerrClientTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: SeerrClient
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rodrigoindustries.SeerrClientTests
        GENERATE_INFOPLIST_FILE: true
        SWIFT_STRICT_CONCURRENCY: targeted
